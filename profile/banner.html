<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Recursive:slnt,wght,CASL,CRSV,MONO@-15..0,300..900,0..1,0..1,0..1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 320px;
    background: #0b0d11;
    font-family: 'Recursive', -apple-system, sans-serif;
    overflow: hidden;
    position: relative;
  }

  .noise {
    position: absolute; inset: 0; opacity: 0.025; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  .glow {
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(196, 168, 130, 0.035) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Horizon lines spanning full width */
  .horizon-lines {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .wordmark {
    font-variation-settings: 'wght' 350, 'MONO' 0, 'CASL' 0, 'CRSV' 0.5, 'slnt' 0;
    font-size: 36px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #d8dce4;
  }

  /* Thin border */
  .frame {
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(196, 168, 130, 0.06);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="noise"></div>
<div class="glow"></div>
<div class="frame"></div>

<!-- Decorative horizon lines echoing the mark -->
<svg class="horizon-lines" viewBox="0 0 1280 320" fill="none" preserveAspectRatio="none">
  <line x1="0" y1="178" x2="1280" y2="178" stroke="#c4a882" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="192" x2="1280" y2="192" stroke="#c4a882" stroke-width="0.5" opacity="0.04"/>
</svg>

<div class="content">
  <svg width="56" height="56" viewBox="0 0 64 64" fill="none">
    <path d="M40 8 A26 26 0 1 0 40 56" fill="none" stroke="#c4a882" stroke-width="5" stroke-linecap="square"/>
    <path d="M20 50 L32 14 L44 50" fill="none" stroke="#d8dce4" stroke-width="2.2" stroke-linecap="square" stroke-linejoin="miter"/>
    <line x1="8" y1="34" x2="56" y2="34" stroke="#c4a882" stroke-width="1.2"/>
    <line x1="10" y1="40" x2="56" y2="40" stroke="#c4a882" stroke-width="0.8" opacity="0.35"/>
  </svg>
  <span class="wordmark">Atlas Crew</span>
</div>

</body>
</html>
