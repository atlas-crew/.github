<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="Atlas Crew Security platform architecture">
  <title>Atlas Crew Security — Platform Architecture</title>
  <desc>Horizontal pipeline: Crucible launches attacks that pass through Synapse WAF (or any bring-your-own WAF) to Chimera's vulnerable targets. Bridge orchestrates the services as substrate. Apparatus appears as a small sidecar — the innovation pipeline where new ideas prototype before becoming features or products.</desc>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Recursive:slnt,wght,CASL,CRSV,MONO@-15..0,300..1000,0..1,0..1,0..1&amp;display=swap');
    text { font-family: 'Recursive', system-ui, -apple-system, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="1200" height="600" fill="#080d18"/>

  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#15223c" stroke-width="1" opacity="0.4"/>
    </pattern>
    <marker id="arrowhead-amber" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#e5a820"/>
    </marker>
    <marker id="arrowhead-dim" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#5a6f8a"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Frame brackets -->
  <g stroke="#2a3a5c" stroke-width="1" opacity="0.4" fill="none">
    <path d="M 28 60 L 28 28 L 60 28"/>
    <path d="M 1140 28 L 1172 28 L 1172 60"/>
    <path d="M 28 540 L 28 572 L 60 572"/>
    <path d="M 1140 572 L 1172 572 L 1172 540"/>
  </g>

  <!-- Title (centered) -->
  <text x="600" y="58" text-anchor="middle" fill="#eef0f4" font-size="24" font-weight="600" letter-spacing="3">ATLAS CREW SECURITY</text>
  <text x="600" y="80" text-anchor="middle" fill="#c4a882" font-size="13" font-style="italic" letter-spacing="0.5">platform architecture</text>

  <!-- ═══ APPARATUS MINI-BADGE (top-right, off to the side) ═══ -->
  <g opacity="0.7">
    <rect x="940" y="24" width="200" height="68" fill="#0d1424" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 3" rx="3"/>
    <text x="952" y="44" fill="#5a6f8a" font-size="9" letter-spacing="1.5" font-weight="500">SANDBOX · R&amp;D</text>
    <text x="952" y="68" fill="#FFFFFF" font-size="18" font-weight="600">Apparatus</text>
    <text x="952" y="84" fill="#5a6f8a" font-size="9" font-style="italic">where ideas prototype</text>
  </g>

  <!-- ═══ MIDDLE: REQUEST PIPELINE — Crucible → Synapse WAF → Chimera ═══ -->
  <text x="600" y="132" text-anchor="middle" fill="#5a6f8a" font-size="10" letter-spacing="2" font-weight="500">── REQUEST PIPELINE ──</text>

  <!-- Crucible card -->
  <g>
    <rect x="80" y="148" width="320" height="220" fill="#15223c" stroke="#e5a820" stroke-width="1.5" rx="4"/>
    <text x="100" y="174" fill="#5a6f8a" font-size="10" letter-spacing="2" font-weight="500">ATTACKER</text>
    <text x="100" y="216" fill="#e5a820" font-size="32" font-weight="800" letter-spacing="1">CRUCIBLE</text>
    <text x="100" y="244" fill="#eef0f4" font-size="13" font-weight="500">Adversary Emulation</text>
    <text x="100" y="274" fill="#5a6f8a" font-size="11">120+ scenarios · DAG execution</text>
    <text x="100" y="294" fill="#5a6f8a" font-size="11">Pass/fail vs. ground-truth</text>
    <text x="100" y="314" fill="#5a6f8a" font-size="11">MITRE ATT&amp;CK aligned</text>
    <text x="100" y="346" fill="#5a6f8a" font-size="10" font-style="italic">Production-grade · open source</text>
  </g>

  <!-- Arrow Crucible → Synapse -->
  <g>
    <line x1="405" y1="258" x2="435" y2="258" stroke="#e5a820" stroke-width="2" marker-end="url(#arrowhead-amber)"/>
    <text x="420" y="248" text-anchor="middle" fill="#e5a820" font-size="9" font-weight="500" letter-spacing="1">attacks</text>
  </g>

  <!-- Synapse WAF card (in the middle of the path — defender) -->
  <g>
    <rect x="440" y="148" width="320" height="220" fill="#15223c" stroke="#8b5cf6" stroke-width="1.5" rx="4"/>
    <text x="460" y="174" fill="#5a6f8a" font-size="10" letter-spacing="2" font-weight="500">DEFENDER · WAF</text>
    <text x="460" y="216" fill="#8b5cf6" font-size="32" font-weight="800" letter-spacing="1">SYNAPSE</text>
    <text x="460" y="244" fill="#eef0f4" font-size="13" font-weight="500">Edge WAF · blocks &amp; allows</text>
    <text x="460" y="274" fill="#5a6f8a" font-size="11">237 rules · 25 DLP patterns</text>
    <text x="460" y="294" fill="#5a6f8a" font-size="11">Sub-10μs · 72K req/s</text>
    <text x="460" y="314" fill="#5a6f8a" font-size="11">Rust/Pingora · single binary</text>
    <text x="460" y="346" fill="#1e90ff" font-size="10" font-style="italic">+ Fleet (multi-tenant SOC observability)</text>
  </g>

  <!-- Arrow Synapse → Chimera -->
  <g>
    <line x1="765" y1="258" x2="795" y2="258" stroke="#e5a820" stroke-width="2" marker-end="url(#arrowhead-amber)"/>
    <text x="780" y="248" text-anchor="middle" fill="#e5a820" font-size="9" font-weight="500" letter-spacing="1">filtered</text>
  </g>

  <!-- Chimera card -->
  <g>
    <rect x="800" y="148" width="320" height="220" fill="#15223c" stroke="#c850a3" stroke-width="1.5" rx="4"/>
    <text x="820" y="174" fill="#5a6f8a" font-size="10" letter-spacing="2" font-weight="500">TARGET</text>
    <text x="820" y="216" fill="#c850a3" font-size="32" font-weight="800" letter-spacing="1">CHIMERA</text>
    <text x="820" y="244" fill="#eef0f4" font-size="13" font-weight="500">Vulnerable API Targets</text>
    <text x="820" y="274" fill="#5a6f8a" font-size="11">480+ endpoints · 25 verticals</text>
    <text x="820" y="294" fill="#5a6f8a" font-size="11">12 production-style portals</text>
    <text x="820" y="314" fill="#5a6f8a" font-size="11">Business-logic flaws</text>
    <text x="820" y="346" fill="#5a6f8a" font-size="10" font-style="italic">X-Ray Inspector · MIT</text>
  </g>

  <!-- BYO WAF caption -->
  <text x="600" y="396" text-anchor="middle" fill="#5a6f8a" font-size="11" font-style="italic">Crucible &amp; Chimera are WAF-agnostic — Synapse is the recommended default; bring your own WAF and the pipeline still works</text>

  <!-- "runs on" arrows from pipeline DOWN to Bridge -->
  <g opacity="0.55">
    <line x1="240" y1="368" x2="240" y2="430" stroke="#5a6f8a" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrowhead-dim)"/>
    <line x1="600" y1="368" x2="600" y2="430" stroke="#5a6f8a" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrowhead-dim)"/>
    <line x1="960" y1="368" x2="960" y2="430" stroke="#5a6f8a" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrowhead-dim)"/>
  </g>

  <!-- ═══ BOTTOM: BRIDGE (substrate, full width) ═══════════ -->
  <g>
    <rect x="80" y="432" width="1040" height="92" fill="#0d1424" stroke="#1e90ff" stroke-width="1.5" rx="4"/>
    <text x="100" y="458" fill="#5a6f8a" font-size="10" letter-spacing="2" font-weight="500">SUBSTRATE · ORCHESTRATION</text>
    <text x="100" y="494" fill="#FFFFFF" font-size="28" font-weight="600">Bridge</text>
    <text x="1100" y="472" text-anchor="end" fill="#eef0f4" font-size="13" font-weight="500">Service Orchestrator</text>
    <text x="1100" y="494" text-anchor="end" fill="#5a6f8a" font-size="11">Stands up Crucible, Synapse, Chimera, custom services in a coordinated graph</text>
    <text x="1100" y="512" text-anchor="end" fill="#5a6f8a" font-size="11">Single binary · dependencies · health checks · teardown</text>
  </g>

  <!-- Footer URL -->
  <text x="600" y="582" text-anchor="middle" fill="#5a6f8a" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1">atlascrew.dev/security</text>
</svg>
