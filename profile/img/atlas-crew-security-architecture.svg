<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="Atlas Crew Security platform architecture">
  <title>Atlas Crew Security — Platform Architecture</title>
  <desc>Layered diagram: Synapse observes traffic at the top; Crucible launches attacks at Chimera in the middle; Bridge and Apparatus form the substrate at the bottom.</desc>

  <!-- Background -->
  <rect width="1200" height="600" fill="#080d18"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#15223c" stroke-width="1" opacity="0.4"/>
    </pattern>
    <marker id="arrowhead-amber" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#e5a820"/>
    </marker>
    <marker id="arrowhead-violet" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowhead-dim" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#5a6f8a"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Frame brackets -->
  <g stroke="#2a3a5c" stroke-width="1" opacity="0.4" fill="none">
    <path d="M 28 60 L 28 28 L 60 28"/>
    <path d="M 1140 28 L 1172 28 L 1172 60"/>
    <path d="M 28 540 L 28 572 L 60 572"/>
    <path d="M 1140 572 L 1172 572 L 1172 540"/>
  </g>

  <!-- Title -->
  <text x="600" y="64" text-anchor="middle" fill="#eef0f4" font-family="system-ui, sans-serif" font-size="24" font-weight="600" letter-spacing="3">ATLAS CREW SECURITY</text>
  <text x="600" y="86" text-anchor="middle" fill="#c4a882" font-family="system-ui, sans-serif" font-size="13" font-style="italic" letter-spacing="0.5">platform architecture</text>

  <!-- ═══ TOP TIER: SYNAPSE ═══════════════════════════════ -->
  <!-- Full-width observability layer -->
  <g>
    <rect x="80" y="120" width="1040" height="90" fill="#15223c" stroke="#8b5cf6" stroke-width="1.5" rx="4"/>
    <!-- Tier label -->
    <text x="100" y="146" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="10" letter-spacing="2" font-weight="500">OBSERVABILITY</text>
    <!-- Product name -->
    <text x="100" y="180" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="32" font-weight="800" letter-spacing="1">SYNAPSE</text>
    <!-- Description on right -->
    <text x="1100" y="158" text-anchor="end" fill="#eef0f4" font-family="system-ui, sans-serif" font-size="14" font-weight="500">Edge WAF + Fleet</text>
    <text x="1100" y="180" text-anchor="end" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="12">Detects attacks, correlates campaigns, observes the trio</text>
    <text x="1100" y="200" text-anchor="end" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="11" font-style="italic">Rust/Pingora · 72K req/s · sub-10μs detection</text>
  </g>

  <!-- ═══ MIDDLE TIER: CRUCIBLE → CHIMERA ════════════════ -->
  <!-- Crucible card (left) -->
  <g>
    <rect x="80" y="250" width="440" height="180" fill="#15223c" stroke="#e5a820" stroke-width="1.5" rx="4"/>
    <!-- Tier label -->
    <text x="100" y="276" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="10" letter-spacing="2" font-weight="500">ATTACK</text>
    <!-- Product name -->
    <text x="100" y="318" fill="#e5a820" font-family="system-ui, sans-serif" font-size="36" font-weight="800" letter-spacing="1">CRUCIBLE</text>
    <text x="100" y="348" fill="#eef0f4" font-family="system-ui, sans-serif" font-size="14" font-weight="500">Adversary Emulation Engine</text>
    <text x="100" y="380" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="12">120+ scenarios · DAG execution</text>
    <text x="100" y="400" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="12">Pass/fail vs. ground-truth assertions</text>
    <text x="100" y="420" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="11" font-style="italic">MITRE ATT&amp;CK aligned</text>
  </g>

  <!-- Attack arrow Crucible → Chimera -->
  <g>
    <line x1="525" y1="340" x2="675" y2="340" stroke="#e5a820" stroke-width="2" marker-end="url(#arrowhead-amber)"/>
    <text x="600" y="328" text-anchor="middle" fill="#e5a820" font-family="system-ui, sans-serif" font-size="11" font-weight="500" letter-spacing="1">EXPLOITS</text>
  </g>

  <!-- Chimera card (right) -->
  <g>
    <rect x="680" y="250" width="440" height="180" fill="#15223c" stroke="#c850a3" stroke-width="1.5" rx="4"/>
    <text x="700" y="276" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="10" letter-spacing="2" font-weight="500">TARGET</text>
    <text x="700" y="318" fill="#c850a3" font-family="system-ui, sans-serif" font-size="36" font-weight="800" letter-spacing="1">CHIMERA</text>
    <text x="700" y="348" fill="#eef0f4" font-family="system-ui, sans-serif" font-size="14" font-weight="500">Vulnerable API Targets</text>
    <text x="700" y="380" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="12">480+ endpoints · 25 verticals</text>
    <text x="700" y="400" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="12">12 branded production-style portals</text>
    <text x="700" y="420" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="11" font-style="italic">Business-logic flaws, X-Ray Inspector</text>
  </g>

  <!-- Synapse observes traffic — vertical arrows from middle to top -->
  <g opacity="0.55">
    <line x1="300" y1="250" x2="300" y2="212" stroke="#5a6f8a" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrowhead-dim)"/>
    <line x1="900" y1="250" x2="900" y2="212" stroke="#5a6f8a" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrowhead-dim)"/>
    <text x="600" y="234" text-anchor="middle" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="10" letter-spacing="1" font-style="italic">observes traffic</text>
  </g>

  <!-- "runs on" connectors from middle to substrate -->
  <g opacity="0.55">
    <line x1="300" y1="430" x2="300" y2="468" stroke="#5a6f8a" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrowhead-dim)"/>
    <line x1="900" y1="430" x2="900" y2="468" stroke="#5a6f8a" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrowhead-dim)"/>
    <text x="600" y="452" text-anchor="middle" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="10" letter-spacing="1" font-style="italic">runs on</text>
  </g>

  <!-- ═══ BOTTOM TIER: BRIDGE + APPARATUS ════════════════ -->
  <!-- Bridge card (left half) -->
  <g>
    <rect x="80" y="470" width="510" height="90" fill="#0d1424" stroke="#1e90ff" stroke-width="1.5" rx="4"/>
    <text x="100" y="496" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="10" letter-spacing="2" font-weight="500">ORCHESTRATION</text>
    <text x="100" y="530" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="26" font-weight="600">Bridge</text>
    <text x="570" y="510" text-anchor="end" fill="#eef0f4" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Service Orchestrator</text>
    <text x="570" y="530" text-anchor="end" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="11">Single-binary lab orchestration</text>
    <text x="570" y="548" text-anchor="end" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="11">Dependencies, health, teardown</text>
  </g>

  <!-- Apparatus card (right half) -->
  <g>
    <rect x="610" y="470" width="510" height="90" fill="#0d1424" stroke="#22c55e" stroke-width="1.5" rx="4"/>
    <text x="630" y="496" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="10" letter-spacing="2" font-weight="500">SIMULATION RUNTIME</text>
    <text x="630" y="530" fill="#FFFFFF" font-family="system-ui, sans-serif" font-size="26" font-weight="600">Apparatus</text>
    <text x="1100" y="510" text-anchor="end" fill="#eef0f4" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Cybersecurity Simulation Lab</text>
    <text x="1100" y="530" text-anchor="end" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="11">Scenario builder, traffic generation</text>
    <text x="1100" y="548" text-anchor="end" fill="#5a6f8a" font-family="system-ui, sans-serif" font-size="11">Timeline, JWT/MTD, supply-chain modules</text>
  </g>

  <!-- Footer URL -->
  <text x="600" y="588" text-anchor="middle" fill="#5a6f8a" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1">atlascrew.dev/security</text>
</svg>
