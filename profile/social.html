<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Recursive:slnt,wght,CASL,CRSV,MONO@-15..0,300..900,0..1,0..1,0..1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 640px;
    background: #0b0d11;
    font-family: 'Recursive', -apple-system, sans-serif;
    overflow: hidden;
    position: relative;
  }

  .noise {
    position: absolute; inset: 0; opacity: 0.025; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  .glow {
    position: absolute;
    top: -140px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(196, 168, 130, 0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .frame {
    position: absolute;
    inset: 16px;
    border: 1px solid rgba(196, 168, 130, 0.06);
    pointer-events: none;
  }

  /* Full-width horizon lines */
  .horizon-lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }

  .mark-row {
    display: flex;
    align-items: center;
    gap: 22px;
  }

  .wordmark {
    font-variation-settings: 'wght' 350, 'MONO' 0, 'CASL' 0, 'CRSV' 0.5, 'slnt' 0;
    font-size: 38px;
    letter-spacing: 9px;
    text-transform: uppercase;
    color: #d8dce4;
  }

  .subtitle {
    font-variation-settings: 'wght' 400, 'MONO' 0, 'CASL' 0.3, 'CRSV' 0.5, 'slnt' 0;
    font-size: 17px;
    color: #919aaa;
    letter-spacing: 0.3px;
    max-width: 560px;
    text-align: center;
    line-height: 1.6;
  }

  .tags {
    display: flex;
    gap: 24px;
    margin-top: 4px;
  }

  .tag {
    font-variation-settings: 'wght' 500, 'MONO' 1, 'CASL' 0, 'CRSV' 0.5, 'slnt' 0;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #5c6678;
  }

  .tag .val {
    color: #c4a882;
  }

  .domain {
    font-variation-settings: 'wght' 400, 'MONO' 1, 'CASL' 0, 'CRSV' 0.5, 'slnt' 0;
    font-size: 13px;
    letter-spacing: 1.5px;
    color: #c4a882;
    opacity: 0.5;
    position: absolute;
    bottom: 32px;
  }
</style>
</head>
<body>

<div class="noise"></div>
<div class="glow"></div>
<div class="frame"></div>

<svg class="horizon-lines" viewBox="0 0 1280 640" fill="none" preserveAspectRatio="none">
  <line x1="0" y1="348" x2="1280" y2="348" stroke="#c4a882" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="360" x2="1280" y2="360" stroke="#c4a882" stroke-width="0.5" opacity="0.035"/>
</svg>

<div class="content">
  <div class="mark-row">
    <svg width="60" height="60" viewBox="0 0 64 64" fill="none">
      <path d="M40 8 A26 26 0 1 0 40 56" fill="none" stroke="#c4a882" stroke-width="5" stroke-linecap="square"/>
      <path d="M20 50 L32 14 L44 50" fill="none" stroke="#d8dce4" stroke-width="2.2" stroke-linecap="square" stroke-linejoin="miter"/>
      <line x1="8" y1="34" x2="56" y2="34" stroke="#c4a882" stroke-width="1.2"/>
      <line x1="10" y1="40" x2="56" y2="40" stroke="#c4a882" stroke-width="0.8" opacity="0.35"/>
    </svg>
    <span class="wordmark">Atlas Crew</span>
  </div>
  <div class="subtitle">Open-source edge security. Detect and block at the application layer with zero external dependencies.</div>
  <div class="tags">
    <span class="tag"><span class="val">Rust</span> / Pingora</span>
    <span class="tag"><span class="val">&lt;1ms</span> detection</span>
    <span class="tag"><span class="val">AGPL-3</span> licensed</span>
  </div>
  <div class="domain">github.com/atlas-crew</div>
</div>

</body>
</html>
